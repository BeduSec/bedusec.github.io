<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeduSec Admin | Blog Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        body { background: #0f172a; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen p-4">
    <div class="max-w-2xl mx-auto mb-6 p-4 bg-slate-900/50 rounded-lg border border-slate-700">
        <p class="text-sm text-amber-400 mb-2">⚠️ If submit button hangs, first allow certificates by tapping each link below:</p>
        <div class="grid grid-cols-2 gap-2 text-xs">
            <a href="https://cdn.tailwindcss.com" target="_blank" class="text-indigo-400 underline break-all">Tailwind</a>
            <a href="https://unpkg.com/feather-icons" target="_blank" class="text-indigo-400 underline break-all">Feather Icons</a>
            <a href="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js" target="_blank" class="text-indigo-400 underline break-all">CryptoJS</a>
            <a href="https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js" target="_blank" class="text-indigo-400 underline break-all">Firebase App</a>
            <a href="https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js" target="_blank" class="text-indigo-400 underline break-all">Firebase Firestore</a>
        </div>
        <p class="text-xs text-slate-400 mt-2">After allowing each, refresh this page and login.</p>
    </div>
    <div id="admin-container" class="w-full max-w-2xl mx-auto"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, getDocs, limit, query } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCs-VRMnT1Ose7cHxRbNabPz8YoHThzzr4",
            authDomain: "bedusec-blogs.firebaseapp.com",
            projectId: "bedusec-blogs",
            storageBucket: "bedusec-blogs.firebasestorage.app",
            messagingSenderId: "736679428058",
            appId: "1:736679428058:web:edaed698f9f9cf464e8ae3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const CORRECT_HASH = "5b95846bde97f6a92430058003444dce";
        let isAuthenticated = false;

        function md5(string) {
            return CryptoJS.MD5(string).toString();
        }

        function showLogin() {
            document.getElementById("admin-container").innerHTML = `
                <div class="glass-card rounded-2xl p-8 shadow-2xl">
                    <div class="flex justify-center mb-6">
                        <i data-feather="lock" class="w-12 h-12 text-indigo-400"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-center text-white mb-6">Admin Access</h2>
                    <form id="login-form">
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                            <input type="password" id="admin-password" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500" required>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition">Login</button>
                    </form>
                    <p id="login-error" class="text-red-400 text-sm mt-4 text-center hidden">Invalid password</p>
                </div>
            `;
            feather.replace();
            document.getElementById("login-form").addEventListener("submit", (e) => {
                e.preventDefault();
                const pwd = document.getElementById("admin-password").value;
                if (md5(pwd) === CORRECT_HASH) {
                    isAuthenticated = true;
                    showBlogForm();
                } else {
                    document.getElementById("login-error").classList.remove("hidden");
                }
            });
        }

        function showBlogForm() {
            document.getElementById("admin-container").innerHTML = `
                <div class="glass-card rounded-2xl p-8 shadow-2xl">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-white">Add New Blog Post</h2>
                        <button id="logout-btn" class="text-slate-400 hover:text-red-400 text-sm">Logout</button>
                    </div>
                    <div id="connection-status" class="mb-4 text-sm text-center"></div>
                    <form id="blog-form">
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-300 mb-2">Title *</label>
                            <input type="text" id="title" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-300 mb-2">Description / Excerpt *</label>
                            <textarea id="description" rows="3" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white"></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-300 mb-2">Cover Image URL</label>
                            <input type="url" id="coverImage" placeholder="https://..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-300 mb-2">Author *</label>
                            <input type="text" id="author" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white">
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-slate-300 mb-2">Lesson ID (unique slug) *</label>
                            <input type="text" id="lessonId" required placeholder="e.g., bypass-amsi" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white">
                        </div>
                        <button type="submit" id="publish-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-lg transition">Publish Blog</button>
                    </form>
                    <div id="form-message" class="mt-4 text-center text-sm"></div>
                </div>
            `;
            feather.replace();

            document.getElementById("logout-btn").addEventListener("click", () => {
                isAuthenticated = false;
                showLogin();
            });

            (async () => {
                const statusDiv = document.getElementById("connection-status");
                try {
                    const testQuery = query(collection(db, "blogs"), limit(1));
                    await getDocs(testQuery);
                    statusDiv.innerHTML = '<span class="text-emerald-400">✅ Firebase connected. Ready to publish.</span>';
                } catch (err) {
                    statusDiv.innerHTML = `<span class="text-red-400">❌ Firebase error: ${err.message}. Check rules.</span>`;
                }
            })();

            const form = document.getElementById("blog-form");
            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                const publishBtn = document.getElementById("publish-btn");
                const originalText = publishBtn.innerHTML;
                publishBtn.innerHTML = '<svg class="animate-spin inline w-4 h-4 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Publishing...';
                publishBtn.disabled = true;

                const title = document.getElementById("title").value.trim();
                const description = document.getElementById("description").value.trim();
                const coverImage = document.getElementById("coverImage").value.trim() || "https://placehold.co/600x400";
                const author = document.getElementById("author").value.trim();
                const lessonId = document.getElementById("lessonId").value.trim();

                if (!title || !description || !author || !lessonId) {
                    showMessage("Please fill all required fields.", "red");
                    publishBtn.innerHTML = originalText;
                    publishBtn.disabled = false;
                    return;
                }

                const newPost = {
                    title,
                    description,
                    coverImage,
                    author,
                    lessonId,
                    date: serverTimestamp()
                };

                const timeoutPromise = new Promise((_, reject) => {
                    setTimeout(() => reject(new Error("Request timed out after 15s.")), 15000);
                });

                try {
                    await Promise.race([
                        addDoc(collection(db, "blogs"), newPost),
                        timeoutPromise
                    ]);
                    showMessage("✅ Blog published successfully!", "green");
                    form.reset();
                } catch (error) {
                    console.error(error);
                    let msg = error.message;
                    if (msg.includes("permission")) msg = "Permission denied. Set Firestore rules: allow write: if true";
                    else if (msg.includes("network")) msg = "Network error. Check internet connection.";
                    else if (msg.includes("timed out")) msg = "Request timed out. Check certificate issues with links above.";
                    showMessage("❌ " + msg, "red");
                } finally {
                    publishBtn.innerHTML = originalText;
                    publishBtn.disabled = false;
                }
            });
        }

        function showMessage(msg, color) {
            const msgDiv = document.getElementById("form-message");
            msgDiv.innerHTML = `<span class="text-${color === "green" ? "emerald" : "red"}-400">${msg}</span>`;
            setTimeout(() => msgDiv.innerHTML = "", 6000);
        }

        showLogin();
    </script>
</body>
</html>
