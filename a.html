<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeduSec Admin | Blog Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"></script>
    <style>
        body { background: #0f172a; }
        .glass-card { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(99, 102, 241, 0.2); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans min-h-screen flex items-center justify-center p-4">
    <div id="admin-container" class="w-full max-w-2xl"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, getDocs, limit, query } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCs-VRMnT1Ose7cHxRbNabPz8YoHThzzr4",
            authDomain: "bedusec-blogs.firebaseapp.com",
            projectId: "bedusec-blogs",
            storageBucket: "bedusec-blogs.firebasestorage.app",
            messagingSenderId: "736679428058",
            appId: "1:736679428058:web:edaed698f9f9cf464e8ae3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const CORRECT_HASH = "5b95846bde97f6a92430058003444dce";

        let isAuthenticated = false;

        function md5(string) {
            return CryptoJS.MD5(string).toString();
        }

        function showLogin() {
            document.getElementById("admin-container").innerHTML = `
                <div class="glass-card rounded-2xl p-8 shadow-2xl">
                    <div class="flex justify-center mb-6">
                        <i data-feather="lock" class="w-12 h-12 text-indigo-400"></i>
                    </div>
                    <h2 class="text-2xl font-bold text-center text-white mb-6">Admin Access</h2>
                    <form id="login-form">
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-300 mb-2">Password</label>
                            <input type="password" id="admin-password" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-indigo-500" required>
                        </div>
                        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg transition">Login</button>
                    </form>
                    <p id="login-error" class="text-red-400 text-sm mt-4 text-center hidden">Invalid password</p>
                </div>
            `;
            feather.replace();
            const form = document.getElementById("login-form");
            if (form) {
                form.addEventListener("submit", (e) => {
                    e.preventDefault();
                    const pwd = document.getElementById("admin-password").value;
                    if (md5(pwd) === CORRECT_HASH) {
                        isAuthenticated = true;
                        showBlogForm();
                    } else {
                        document.getElementById("login-error").classList.remove("hidden");
                    }
                });
            } else {
                console.error("Login form not found");
            }
        }

        async function testFirebaseConnection() {
            try {
                const testQuery = query(collection(db, "blogs"), limit(1));
                await getDocs(testQuery);
                return true;
            } catch (err) {
                console.error("Firebase connection test failed:", err);
                return false;
            }
        }

        function showBlogForm() {
            document.getElementById("admin-container").innerHTML = `
                <div class="glass-card rounded-2xl p-8 shadow-2xl">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-white">Add New Blog Post</h2>
                        <button id="logout-btn" class="text-slate-400 hover:text-red-400 text-sm">Logout</button>
                    </div>
                    <div id="connection-status" class="mb-4 text-sm text-center"></div>
                    <form id="blog-form">
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-300 mb-2">Title *</label>
                            <input type="text" id="title" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-300 mb-2">Description / Excerpt *</label>
                            <textarea id="description" rows="3" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white"></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-300 mb-2">Cover Image URL</label>
                            <input type="url" id="coverImage" placeholder="https://..." class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-medium text-slate-300 mb-2">Author *</label>
                            <input type="text" id="author" required class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white">
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-medium text-slate-300 mb-2">Lesson ID (unique slug) *</label>
                            <input type="text" id="lessonId" required placeholder="e.g., bypass-amsi" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white">
                        </div>
                        <button type="submit" id="publish-btn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-4 rounded-lg transition">Publish Blog</button>
                    </form>
                    <div id="form-message" class="mt-4 text-center text-sm"></div>
                </div>
            `;
            feather.replace();

            const logoutBtn = document.getElementById("logout-btn");
            if (logoutBtn) {
                logoutBtn.addEventListener("click", () => {
                    isAuthenticated = false;
                    showLogin();
                });
            }

            const form = document.getElementById("blog-form");
            if (form) {
                form.addEventListener("submit", async (e) => {
                    e.preventDefault();
                    const publishBtn = document.getElementById("publish-btn");
                    const originalText = publishBtn.innerHTML;
                    publishBtn.innerHTML = '<i data-feather="loader" class="animate-spin w-4 h-4 inline mr-2"></i> Publishing...';
                    publishBtn.disabled = true;
                    feather.replace();

                    const title = document.getElementById("title").value.trim();
                    const description = document.getElementById("description").value.trim();
                    const coverImage = document.getElementById("coverImage").value.trim() || "https://placehold.co/600x400";
                    const author = document.getElementById("author").value.trim();
                    const lessonId = document.getElementById("lessonId").value.trim();

                    if (!title || !description || !author || !lessonId) {
                        showMessage("Please fill all required fields.", "red");
                        publishBtn.innerHTML = originalText;
                        publishBtn.disabled = false;
                        feather.replace();
                        return;
                    }

                    const newPost = {
                        title,
                        description,
                        coverImage,
                        author,
                        lessonId,
                        date: serverTimestamp()
                    };

                    try {
                        await addDoc(collection(db, "blogs"), newPost);
                        showMessage("Blog post published successfully!", "green");
                        form.reset();
                    } catch (error) {
                        console.error("Firestore write error:", error);
                        let errorMsg = error.message;
                        if (errorMsg.includes("permission")) {
                            errorMsg = "Permission denied. Check Firestore rules: allow write: if true";
                        } else if (errorMsg.includes("network")) {
                            errorMsg = "Network error. Check your internet connection.";
                        }
                        showMessage("Error: " + errorMsg, "red");
                    } finally {
                        publishBtn.innerHTML = originalText;
                        publishBtn.disabled = false;
                        feather.replace();
                    }
                });
            } else {
                console.error("Blog form not found");
            }

            testFirebaseConnection().then(connected => {
                const statusDiv = document.getElementById("connection-status");
                if (connected) {
                    statusDiv.innerHTML = '<span class="text-emerald-400">✅ Firebase connected. You can publish.</span>';
                } else {
                    statusDiv.innerHTML = '<span class="text-red-400">❌ Cannot reach Firebase. Check rules and network.</span>';
                }
            });
        }

        function showMessage(msg, color) {
            const msgDiv = document.getElementById("form-message");
            msgDiv.innerHTML = `<span class="text-${color === "green" ? "emerald" : "red"}-400">${msg}</span>`;
            setTimeout(() => msgDiv.innerHTML = "", 5000);
        }

        showLogin();
    </script>
</body>
</html>
